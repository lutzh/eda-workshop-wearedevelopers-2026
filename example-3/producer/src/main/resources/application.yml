spring:
  application:
    name: producer-example-3
  datasource:
    url: jdbc:postgresql://localhost:5432/workshop
    username: workshop
    password: workshop
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: producer_schema
  kafka:
    bootstrap-servers: localhost:9092

kafka:
  topic:
    operation-completed: operation-completed

logging:
  level:
    com.workshop: INFO
    org.apache.kafka: WARN
