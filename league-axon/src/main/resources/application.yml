spring:
  datasource:
    url: jdbc:h2:mem:leaguedb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

axon:
  serializer:
    general: jackson
    events: jackson
    messages: jackson
  eventhandling:
    processors:
      league-projection:
        mode: tracking

logging:
  level:
    eu.reactivesystems: DEBUG
    org.axonframework: WARN
